<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18?dev';
    import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
    import * as zebar from 'https://esm.sh/zebar@3.0';

    const providers = zebar.createProviderGroup({
      komorebi: { type: 'komorebi' },
      date: { type: 'date', formatting: 'HH:mm', refreshInterval: 30000 },
      dateFull: { type: 'date', formatting: 'dd/MM', refreshInterval: 60000 },
      cpu: { type: 'cpu', refreshInterval: 3000 },
      memory: { type: 'memory', refreshInterval: 5000 },
      network: { type: 'network', refreshInterval: 2000 },
      audio: { type: 'audio' },
      systray: { type: 'systray' },
    });

    // ── Icon cache: exe name → base64 data URL ────────────────────
    const iconCache = {};       // { 'msedge.exe': 'data:image/png;base64,...' }
    const iconPending = {};     // { 'msedge.exe': true } — extraction in progress
    const FALLBACK_LABELS = {
      'msedge': 'Ed', 'chrome': 'Cr', 'firefox': 'Fx', 'brave': 'Br',
      'windowsterminal': '>_', 'wt': '>_', 'wezterm-gui': '>_', 'alacritty': '>_',
      'code': 'VS', 'cursor': 'Cu', 'devenv': 'VS', 'rider': 'Ri', 'idea64': 'IJ',
      'explorer': 'Ex', 'spotify': 'Sp', 'discord': 'Dc', 'slack': 'Sl',
      'teams': 'Tm', 'telegram': 'Tg', 'whatsapp': 'Wa',
      'notepad': 'Np', 'notepad++': 'N+',
      'winword': 'Wo', 'excel': 'Xl', 'powerpnt': 'Pp', 'outlook': 'Ol', 'onenote': 'On',
      'mstsc': 'Rd', 'obs64': 'OB', 'vlc': 'VL', 'figma': 'Fi',
    };

    function getFallbackLabel(exe) {
      if (!exe) return '?';
      const key = exe.split(/[/\\]/).pop().replace('.exe', '').toLowerCase();
      return FALLBACK_LABELS[key] || key.slice(0, 2).toUpperCase();
    }

    function extractIcon(exe, onDone) {
      if (!exe || iconCache[exe] || iconPending[exe]) return;
      iconPending[exe] = true;
      const cmd = `[void][System.Reflection.Assembly]::LoadWithPartialName('System.Drawing');` +
        `$p=(Get-Command '${exe}' -EA SilentlyContinue|Select -First 1 -Exp Source);` +
        `if(!$p){$p=(Get-ItemProperty 'HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\App Paths\\${exe}' -EA SilentlyContinue).'(default)'}` +
        `if(!$p){$p=(where.exe '${exe}' 2>$null|Select -First 1)}` +
        `if(!$p){$p=@(` +
          `'C:\\Program Files','C:\\Program Files (x86)',` +
          `$env:LOCALAPPDATA+'\\Programs'` +
        `)|%{Get-ChildItem $_ -Filter '${exe}' -Recurse -Depth 4 -EA SilentlyContinue}|Select -First 1 -Exp FullName}` +
        `if($p -and (Test-Path $p)){$i=[System.Drawing.Icon]::ExtractAssociatedIcon($p);` +
        `$b=$i.ToBitmap();$m=New-Object IO.MemoryStream;` +
        `$b.Save($m,[System.Drawing.Imaging.ImageFormat]::Png);` +
        `[Convert]::ToBase64String($m.ToArray())}`;
      zebar.shellExec('powershell', ['-NoProfile', '-Command', cmd])
        .then(result => {
          const b64 = (result?.stdout || '').trim();
          if (b64 && b64.length > 20) {
            iconCache[exe] = `data:image/png;base64,${b64}`;
          } else {
            iconCache[exe] = null; // mark as failed
          }
          delete iconPending[exe];
          onDone();
        })
        .catch(() => {
          iconCache[exe] = null;
          delete iconPending[exe];
        });
    }

    function focusWindow(hwnd) {
      if (!hwnd) return;
      zebar.shellExec('powershell', [
        '-NoProfile', '-Command',
        `Add-Type 'using System;using System.Runtime.InteropServices;public class FW{[DllImport("user32.dll")]public static extern bool SetForegroundWindow(IntPtr h);}';[FW]::SetForegroundWindow([IntPtr]${hwnd})`
      ]);
    }

    function isPrimaryMonitor(km) {
      if (!km?.currentMonitor) return false;
      const s = km.currentMonitor.workAreaSize || km.currentMonitor.size;
      return s.left === 0 && s.top === 0;
    }

    function getWindowsForMonitor(km) {
      if (!km?.displayedWorkspace) return [];
      const ws = km.displayedWorkspace;
      const wins = [];
      // Try both zebar provider naming conventions
      const containers = ws.tilingContainers || ws.containers || [];
      containers.forEach(c => {
        const cWindows = c.windows || [];
        cWindows.forEach(w => wins.push(w));
      });
      if (ws.monocleContainer) {
        const mWindows = ws.monocleContainer.windows || [];
        mWindows.forEach(w => wins.push(w));
      }
      if (ws.maximizedWindow) wins.push(ws.maximizedWindow);
      return wins;
    }

    // ── Bluetooth headset battery polling ──────────────────────────
    let btBattery = null;
    let btLastPoll = 0;
    const BT_POLL_MS = 60000;

    function pollBtBattery(onDone) {
      const now = Date.now();
      if (now - btLastPoll < BT_POLL_MS) return;
      btLastPoll = now;
      const cmd = "Get-PnpDevice -FriendlyName '*soundcore*' | ForEach-Object { ($_ | Get-PnpDeviceProperty -KeyName '{104EA319-6EE2-4701-BD47-8DDBF425BBE5} 2' -EA SilentlyContinue | Where-Object Type -ne Empty).Data } | Where-Object { $_ } | Select -First 1";
      zebar.shellExec('powershell', ['-NoProfile', '-Command', cmd])
        .then(r => {
          const val = parseInt((r?.stdout || '').trim(), 10);
          btBattery = isNaN(val) ? null : val;
          onDone();
        })
        .catch(() => { btBattery = null; });
    }

    function formatGB(bytes) {
      return (bytes / 1073741824).toFixed(1);
    }

    function formatSpeed(traffic) {
      if (!traffic) return { down: '0', up: '0' };
      const down = traffic.received?.siValue ?? 0;
      const up = traffic.transmitted?.siValue ?? 0;
      const fmt = (v) => v >= 1000 ? (v / 1000).toFixed(1) + 'G' : v.toFixed(0) + 'M';
      return { down: fmt(down), up: fmt(up) };
    }

    // ── Ring gauge component ────────────────────────────────────────
    const R = 16, STROKE = 3, CIRC = 2 * Math.PI * R;

    function Ring({ pct, color, label, sub }) {
      const offset = CIRC - (Math.min(pct, 100) / 100) * CIRC;
      const warnColor = pct >= 90 ? 'var(--accent-err)' : pct >= 70 ? 'var(--accent-warn)' : color;
      return (
        <div className="ring-widget">
          <svg width="38" height="38" viewBox="0 0 38 38">
            <circle cx="19" cy="19" r={R} fill="none" stroke="var(--bg-hover)" strokeWidth={STROKE} />
            <circle cx="19" cy="19" r={R} fill="none" stroke={warnColor} strokeWidth={STROKE}
              strokeDasharray={CIRC} strokeDashoffset={offset}
              strokeLinecap="round" transform="rotate(-90 19 19)"
              style={{ transition: 'stroke-dashoffset 0.5s ease, stroke 0.3s ease' }} />
            <text x="19" y="21" textAnchor="middle" className="ring-value">{label}</text>
          </svg>
          <span className="ring-sub">{sub}</span>
        </div>
      );
    }

    function App() {
      const [output, setOutput] = useState(providers.outputMap);
      const [, setTick] = useState(0);
      const rerender = () => setTick(t => t + 1);
      useEffect(() => {
        providers.onOutput(() => setOutput({ ...providers.outputMap }));
      }, []);

      const km = output.komorebi;
      const workspaces = (km?.currentWorkspaces || []).slice(0, 2);
      const focusedName = km?.focusedWorkspace?.name;
      const primary = isPrimaryMonitor(km);
      const windows = getWindowsForMonitor(km);

      // Poll BT battery on primary monitor
      if (primary) pollBtBattery(rerender);

      // Trigger icon extraction for any new exe
      windows.forEach(w => {
        if (w.exe && !iconCache[w.exe] && iconCache[w.exe] !== null) {
          extractIcon(w.exe, rerender);
        }
      });

      const cpuUsage = Math.round(output.cpu?.usage || 0);
      const mem = output.memory;
      const memUsed = mem ? formatGB(mem.usedMemory) : '0';
      const memTotal = mem ? formatGB(mem.totalMemory) : '0';
      const memPct = Math.round(mem?.usage || 0);

      const playback = output.audio?.defaultPlaybackDevice;
      const volume = playback ? Math.round(playback.volume) : null;
      const isMuted = playback?.isMuted;

      const speed = formatSpeed(output.network?.traffic);

      return (
        <div className="bar">
          {/* ── Top: Meters (primary only) + Workspaces + Taskbar ── */}
          <div className="bar__top">
            {primary && (
              <>
                <Ring pct={cpuUsage} color="var(--accent)" label={cpuUsage} sub="cpu" />
                <Ring pct={memPct} color="var(--accent)" label={memUsed} sub={memTotal + 'G'} />

                <div className="net-widget">
                  <div className="net-row">
                    <span className="net-arrow net-down">v</span>
                    <span className="net-value">{speed.down}</span>
                  </div>
                  <div className="net-row">
                    <span className="net-arrow net-up">^</span>
                    <span className="net-value">{speed.up}</span>
                  </div>
                  <span className="net-label">mb/s</span>
                </div>

                <div className="divider" />
              </>
            )}

            {/* ── Workspaces ── */}
            {workspaces.map((ws, i) => {
              const hasTiling = ws.tilingContainers?.length > 0;
              const hasMonocle = ws.monocleContainer != null;
              const hasMax = ws.maximizedWindow != null;
              const populated = hasTiling || hasMonocle || hasMax;
              const focused = ws.name === focusedName;
              const cls = `workspace${focused ? ' focused' : ''}${populated && !focused ? ' populated' : ''}`;
              return <button key={i} className={cls}>{ws.name}</button>;
            })}

            <div className="divider" />

            {/* ── Taskbar ── */}
            <div className="taskbar">
              {windows.map((w, i) => {
                const cachedIcon = iconCache[w.exe];
                return (
                  <div
                    key={w.hwnd || i}
                    className="taskbar__item"
                    title={w.title}
                    onClick={() => focusWindow(w.hwnd)}
                  >
                    {cachedIcon ? (
                      <img className="taskbar__img" src={cachedIcon} alt="" />
                    ) : (
                      <span className="taskbar__icon">{getFallbackLabel(w.exe)}</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Bottom: Systray + Audio + Battery + Clock ── */}
          <div className="bar__bottom">
            {primary && output.systray && (
              <>
                <div className="systray">
                  {output.systray.icons.map(icon => (
                    <img
                      key={icon.id}
                      className="systray-icon"
                      src={icon.iconUrl}
                      title={icon.tooltip}
                      onClick={e => { e.preventDefault(); output.systray.onLeftClick(icon.id); }}
                      onContextMenu={e => { e.preventDefault(); output.systray.onRightClick(icon.id); }}
                    />
                  ))}
                </div>
                <div className="divider" />
              </>
            )}

            {/* ── BT headset battery (primary only) ── */}
            {primary && btBattery !== null && (
              <div className="info-widget">
                <span className="info-value">{btBattery}%</span>
                <span className="info-label">headset</span>
              </div>
            )}

            {/* ── Audio (primary only) ── */}
            {primary && playback && (
              <>
                <div className="info-widget" title={playback.name}>
                  <span className="info-value">{isMuted ? 'M' : volume + '%'}</span>
                  <span className="info-label">{playback.name || ''}</span>
                </div>
                <div className="divider" />
              </>
            )}

            {/* ── Clock ── */}
            <div className="clock">
              <span className="clock__time">{output.date?.formatted || '--:--'}</span>
              <span className="clock__date">{output.dateFull?.formatted || '--/--'}</span>
            </div>
          </div>
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
