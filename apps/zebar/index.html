<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18?dev';
    import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
    import * as zebar from 'https://esm.sh/zebar@3.0';

    const providers = zebar.createProviderGroup({
      cpu: { type: 'cpu', refreshInterval: 3000 },
      memory: { type: 'memory', refreshInterval: 5000 },
      network: { type: 'network', refreshInterval: 2000 },
    });

    const DAEMON_PS1 = 'C:\\Users\\rcamara\\.glzr\\zebar\\local.right-bar\\daemon.ps1';
    const BT_READ_CMD = 'if(Test-Path $env:TEMP\\zebar-bt.txt){Get-Content $env:TEMP\\zebar-bt.txt}else{"null"}';

    let btBattery = null;

    function readBtBattery(onDone) {
      zebar.shellExec('powershell', ['-NoProfile', '-Command', BT_READ_CMD])
        .then(r => {
          const val = parseInt((r?.stdout || '').trim(), 10);
          btBattery = isNaN(val) ? null : val;
          onDone();
        })
        .catch(() => { btBattery = null; });
    }

    function formatGB(bytes) {
      return Math.round(bytes / 1073741824);
    }

    function formatSpeed(traffic) {
      if (!traffic) return { down: '0', up: '0', downUnit: '', upUnit: '' };
      const down = traffic.received?.siValue ?? 0;
      const up = traffic.transmitted?.siValue ?? 0;
      const fmt = (v) => {
        if (v >= 1000) return { val: (v / 1000).toFixed(1), unit: 'G' };
        if (v >= 1) return { val: Math.round(v), unit: 'M' };
        return { val: Math.round(v * 1000), unit: 'K' };
      };
      const d = fmt(down), u = fmt(up);
      return { down: d.val, downUnit: d.unit, up: u.val, upUnit: u.unit };
    }

    function Meter({ pct, label, value }) {
      const color = pct >= 90 ? 'var(--accent-err)' : pct >= 70 ? 'var(--accent-warn)' : 'var(--accent)';
      return (
        <div className="meter">
          <span className="meter__label">{label}</span>
          <span className="meter__value">{value}</span>
          <div className="meter__track">
            <div className="meter__fill" style={{ width: `${Math.min(pct, 100)}%`, background: color, transition: 'width 0.5s ease, background 0.3s ease' }} />
          </div>
        </div>
      );
    }

    function App() {
      const [output, setOutput] = useState(providers.outputMap);
      const [, setTick] = useState(0);
      const rerender = () => setTick(t => t + 1);

      useEffect(() => {
        providers.onOutput(() => setOutput({ ...providers.outputMap }));
        // Start background daemon for z-order fix + BT battery polling
        zebar.shellExec('powershell', ['-NoProfile', '-ExecutionPolicy', 'Bypass', '-File', DAEMON_PS1]).catch(() => {});
        // Read BT battery file every 60s
        readBtBattery(rerender);
        const btInterval = setInterval(() => readBtBattery(rerender), 60000);
        return () => clearInterval(btInterval);
      }, []);

      const cpuPct = Math.round(output.cpu?.usage || 0);
      const mem = output.memory;
      const memUsed = mem ? formatGB(mem.usedMemory) : 0;
      const memTotal = mem ? formatGB(mem.totalMemory) : 0;
      const memPct = Math.round(mem?.usage || 0);
      const speed = formatSpeed(output.network?.traffic);

      return (
        <div className="bar">
          <div className="bar__top">
            <div className="metrics">
              <Meter pct={cpuPct} label="CPU" value={cpuPct + '%'} />
              <Meter pct={memPct} label="MEM" value={memUsed + '/' + memTotal + 'G'} />
              <div className="net-widget">
                <span className="meter__label">NET</span>
                <div className="net-row">
                  <span className="net-arrow net-down">{'\u25BC'}</span>
                  <span className="net-value">{speed.down}</span>
                  <span className="net-unit">{speed.downUnit}</span>
                </div>
                <div className="net-row">
                  <span className="net-arrow net-up">{'\u25B2'}</span>
                  <span className="net-value">{speed.up}</span>
                  <span className="net-unit">{speed.upUnit}</span>
                </div>
              </div>
            </div>
          </div>

          {btBattery !== null && (
            <div className="bar__bottom">
              <div className="divider" />
              <div className="info-widget">
                <span className="info-value">{btBattery}%</span>
                <span className="info-label">headset</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
