# --- Hyprland: light Windows-like defaults ---
# Apply: ~/.config/hypr/hyprland.conf

# --- Wayland env (avoid broken apps) ---
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland

# --- Variables ---
$mainMod = SUPER
$menu = wofi --show drun

# --- Monitor (placeholder: do not hardcode names) ---
# List names with: hyprctl monitors
# Then add e.g.: monitor=DP-1,1920x1080@60,0x0,1
# monitor=HDMI-A-1,preferred,0x0,1

# --- Input: default US-INTL (external keyboard) ---
input {
    follow_mouse = 0
    kb_layout = us
    kb_variant = intl
    sensitivity = 0
}

# --- Per-device keyboard (ABNT2 laptop + US-INTL external) ---
# Get device names: hyprctl devices
# Then uncomment and replace <INTERNAL_KEYBOARD_NAME> / <EXTERNAL_KEYBOARD_NAME>.
#
# Example (internal laptop = ABNT2):
# device {
#     name = <INTERNAL_KEYBOARD_NAME>
#     kb_layout = br
#     kb_variant = abnt2
# }
#
# Example (external = US-INTL, optional if already default):
# device {
#     name = <EXTERNAL_KEYBOARD_NAME>
#     kb_layout = us
#     kb_variant = intl
# }
#
# Optional: cycle layout (replace <DEVICE> with name from hyprctl devices): bind = $mainMod, Z, exec, hyprctl switchxkblayout <DEVICE> next

# --- General ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# --- Binds ---
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Mouse move/resize (Windows-like)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Fullscreen
bind = $mainMod, F, fullscreen

# --- Autostart (light) ---
exec-once = waybar
exec-once = hyprpaper
