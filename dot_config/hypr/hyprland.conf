# Hyprland 0.53 – wiki: https://wiki.hypr.land/Configuring/

# Monitores: DP-2 centro, HDMI-A-1 cima, eDP-1 direita
monitor=DP-2,3440x1440@159.96,0x0,1
monitor=HDMI-A-1,2560x1080@60.00,440x-1080,1
monitor=eDP-1,1920x1080@60.06,3440x0,1.5


$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = waybar
# Wallpaper via swww (mais confiável que hyprpaper)
exec-once = swww-daemon && swww img /home/rcamara/Repos/wpaper/wallpaper.png
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
#env = LIBVA_DRIVER_NAME,nvidia
#env = GBM_BACKEND,nvidia-drm
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = WLR_NO_HARDWARE_CURSORS,1

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # Master layout: janela principal + pilha lateral (evita dwindle ficar repartindo tudo em micro-janelas)
    layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# Animações mínimas (só slide pra popups tipo wofi)
animations {
    enabled = yes
    bezier = quick, 0.15, 0, 0.1, 1

    # Desliga tudo por padrão
    animation = global, 0
    # Só janelas: slide de baixo pra cima
    animation = windows, 1, 3, quick, slide
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# Multi-monitor: fixar workspaces em monitores (evita janelas pulando de monitor)
# DP-2 = centro/baixo, HDMI-A-1 = cima, eDP-1 = direita (ajuste se sua ordem for outra)
workspace = 1, monitor:DP-2
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:eDP-1
# Workspaces 4–10 seguem o monitor focado; para fixar mais: workspace = 4, monitor:DP-2, etc.


# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# Touch gestures (3 dedos horizontal = trocar workspace)
# gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER

bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = SUPER SHIFT, S, exec, ~/.local/bin/hyprshot

# Programas principais
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
# Super: abre menu; Super de novo: fecha (estilo Windows)
bindr = $mainMod, SUPER_L, exec, pkill wofi || $menu
bind = $mainMod, space, exec, pkill wofi || $menu
bind = $mainMod, V, togglefloating,
#bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Master layout: trocar janela atual com a master (menos resize com rato)
bind = $mainMod SHIFT, RETURN, layoutmsg, swapwithmaster
# Tabbed no workspace atual (agrupar janelas em abas)
bind = $mainMod, T, layoutmsg, toggletabbed
# Resize por teclado direto (H/J/K/L já são movefocus; usar Ctrl para não conflitar)
bind = $mainMod CTRL, H, resizeactive, -40 0
bind = $mainMod CTRL, L, resizeactive, 40 0
bind = $mainMod CTRL, K, resizeactive, 0 -40
bind = $mainMod CTRL, J, resizeactive, 0 40

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Janela
bind = $mainMod, F, fullscreen,
# D removido (duplicava Super+V para togglefloating)
# bind = $mainMod, D, togglefloating,
bind = $mainMod, R, submap, resize

# Resize com HJKL
submap = resize
bind = , H, resizeactive, -20 0
bind = , L, resizeactive, 20 0
bind = , K, resizeactive, 0 -20
bind = , J, resizeactive, 0 20
bind = , escape, submap, reset
submap = reset

# Navegação entre janelas com hjkl
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Alt+Tab: ciclo entre TODAS as janelas em todos os monitores (script; cyclenext nativo só cicla no workspace atual)
bindl = ALT, Tab, exec, $HOME/.config/hypr/cycle-windows.sh next
bind = ALT SHIFT, Tab, exec, $HOME/.config/hypr/cycle-windows.sh prev

# Workspaces [0-9] e mover janela pra workspace
bindl = $mainMod, 1, workspace, 1
bindl = $mainMod, 2, workspace, 2
bindl = $mainMod, 3, workspace, 3
bindl = $mainMod, 4, workspace, 4
bindl = $mainMod, 5, workspace, 5
bindl = $mainMod, 6, workspace, 6
bindl = $mainMod, 7, workspace, 7
bindl = $mainMod, 8, workspace, 8
bindl = $mainMod, 9, workspace, 9
bindl = $mainMod, 0, workspace, 10

bindl = $mainMod SHIFT, 1, movetoworkspace, 1
bindl = $mainMod SHIFT, 2, movetoworkspace, 2
bindl = $mainMod SHIFT, 3, movetoworkspace, 3
bindl = $mainMod SHIFT, 4, movetoworkspace, 4
bindl = $mainMod SHIFT, 5, movetoworkspace, 5
bindl = $mainMod SHIFT, 6, movetoworkspace, 6
bindl = $mainMod SHIFT, 7, movetoworkspace, 7
bindl = $mainMod SHIFT, 8, movetoworkspace, 8
bindl = $mainMod SHIFT, 9, movetoworkspace, 9
bindl = $mainMod SHIFT, 0, movetoworkspace, 10

# Mover e redimensionar com mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Bloqueia maximize de qualquer app
windowrule {
  name = suppress-maximize
  match:class = .*
  suppress_event = maximize
}

# Wofi (power menu): flutua, posição inicial aprox. + script ajusta por monitor
windowrule {
  name = wofi-float
  match:class = wofi
  float = yes
  move = monitor_w-250 monitor_h-160
  animation = none
}
