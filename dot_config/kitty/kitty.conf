# Kitty — minimal defaults, Nerd Font fallback
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        11.0

shell            zsh
scrollback_lines 5000

cursor_shape     block
cursor_blink_interval 0.5

window_padding_width 4
hide_window_decorations no

enable_audio_bell no
